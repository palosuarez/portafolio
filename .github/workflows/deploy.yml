name: Deploy Portfolio

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL != '' && vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm install

      - name: Validate public API URL 🔐
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::Missing VITE_API_BASE_URL. Set it in GitHub Actions Variables or Secrets."
            exit 1
          fi
          echo "Using VITE_API_BASE_URL=$VITE_API_BASE_URL"

      - name: Build Project 🏗️
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
