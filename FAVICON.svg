<svg viewBox="0 0 320 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes flicker {
        0%, 92%, 100% { opacity: 1; }
        93% { opacity: 0.5; }
        94% { opacity: 1; }
        96% { opacity: 0.3; }
        97% { opacity: 1; }
      }
      .nl { animation: flicker 5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Líneas principales -->
  <g class="nl" stroke="#00f0ff" fill="none" stroke-linecap="round" filter="url(#neon)">
    <line x1="80" y1="40"  x2="80"  y2="380" stroke-width="1.5"/>
    <line x1="80" y1="40"  x2="220" y2="40"  stroke-width="1.5"/>
    <line x1="220" y1="40" x2="220" y2="200" stroke-width="1.5"/>
    <line x1="80" y1="200" x2="220" y2="200" stroke-width="1.5"/>

    <!-- Branches -->
    <line x1="220" y1="40"  x2="290" y2="40"  stroke-width="0.8"/>
    <line x1="290" y1="40"  x2="290" y2="100" stroke-width="0.8"/>
    <line x1="220" y1="200" x2="290" y2="200" stroke-width="0.8"/>
    <line x1="290" y1="200" x2="290" y2="260" stroke-width="0.8"/>
    <line x1="80"  y1="300" x2="20"  y2="300" stroke-width="0.8"/>
    <line x1="80"  y1="380" x2="20"  y2="380" stroke-width="0.8"/>
    <line x1="80"  y1="120" x2="20"  y2="120" stroke-width="0.8"/>
  </g>

  <!-- Nodos principales -->
  <g class="nl" fill="#00f0ff" filter="url(#neon)">
    <circle cx="80"  cy="40"  r="4"/>
    <circle cx="220" cy="40"  r="4"/>
    <circle cx="220" cy="200" r="4"/>
    <circle cx="80"  cy="200" r="4"/>
    <circle cx="80"  cy="380" r="4"/>
  </g>

  <!-- Anillos -->
  <g class="nl" stroke="#00f0ff" fill="none" stroke-width="0.8" filter="url(#neon)">
    <circle cx="220" cy="40"  r="9"/>
    <circle cx="220" cy="200" r="9"/>
    <circle cx="80"  cy="380" r="9"/>
  </g>

  <!-- Nodos branch -->
  <g class="nl" fill="#00f0ff" filter="url(#neon)">
    <circle cx="290" cy="40"  r="3"/>
    <circle cx="290" cy="100" r="3"/>
    <circle cx="290" cy="200" r="3"/>
    <circle cx="290" cy="260" r="3"/>
    <circle cx="20"  cy="120" r="3"/>
    <circle cx="20"  cy="300" r="3"/>
    <circle cx="20"  cy="380" r="3"/>
  </g>

  <!-- Punto central pulsante -->
  <circle class="nl" cx="150" cy="120" r="5" fill="#00f0ff" filter="url(#neon)"/>
  <circle cx="150" cy="120" r="5" fill="none" stroke="#00f0ff" stroke-width="1" filter="url(#neon)" opacity="0.6">
    <animate attributeName="r" values="5;20;5" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>